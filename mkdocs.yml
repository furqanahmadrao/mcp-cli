site_name: mcp-cli Documentation
site_description: Lightweight MCP CLI Client
repo_url: https://github.com/furqanahmadrao/mcp-cli
repo_name: mcp-cli
edit_uri: edit/main/docs/

theme:
  name: material
  logo: assets/logo.svg
  favicon: assets/favicon.ico
  palette:
    - scheme: default
      primary: blue
      accent: blue
      toggle:
        icon: material/lightbulb-outline
        name: Switch to dark mode
    - scheme: slate
      primary: blue
      accent: blue
      toggle:
        icon: material/lightbulb
        name: Switch to light mode
  features:
    - navigation.top
    - navigation.tabs
    - navigation.sections
    - navigation.instant
    - navigation.path
    - toc.integrate
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.code.annotate

plugins:
  - search
  - social

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.highlight:
      use_pygments: true
  - pymdownx.tasklist:
      custom_checkbox: true
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - toc:
      permalink: true
  - attr_list
  - md_in_html

nav:
  - Home: index.md
  - Getting Started:
      - Quick Start: getting-started/quick-start.md
      - Installation: getting-started/installation.md
  - Tutorials:
      - Your First Tool Discovery: tutorials/first-discovery.md
      - Execute Your First Tool: tutorials/first-execution.md
      - Set Up Multiple Servers: tutorials/multi-server-setup.md
  - How-to Guides:
      - Configuration: guides/configuration.md
      - Authentication:
          - Bearer Tokens: guides/auth-bearer.md
          - OAuth 2.0: guides/auth-oauth.md
      - Using Profiles: guides/profiles.md
      - Troubleshooting: guides/troubleshooting.md
  - Reference:
      - CLI Commands: reference/cli-commands.md
      - Configuration Schema: reference/config-schema.md
      - Error Handling: reference/errors.md
      - API & Tool Discovery: reference/api-discovery.md
  - Explanation:
      - Architecture: explanation/architecture.md
      - Design Philosophy: explanation/design-philosophy.md
      - Authentication Flow: explanation/auth-flows.md
      - Tool Namespacing: explanation/tool-namespacing.md
  - Contributing:
      - Contributing Guide: contributing/index.md
      - Development Setup: contributing/setup.md

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/yourusername/mcp-cli
    - icon: fontawesome/brands/npm
      link: https://www.npmjs.com/package/mcpcli

copyright: Copyright &copy; 2026 Furqan
